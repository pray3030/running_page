name: Run Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *' # 北京时间凌晨5点自动跑
  push:
    branches:
      - master

env:
  # === 关键修改区 ===
  RUN_TYPE: garmin_cn      # 强制改为佳明中国区
  ATHLETE: Yang            # 改成你的名字
  TITLE: "Yang's Road to 320" # 你的跑步主页标题
  BIRTHDAY_MONTH: 1986-03  # 填入你的生日月份，生成人生格子图
  # ================
  
  MIN_GRID_DISTANCE: 10
  TITLE_GRID: Over 10km Runs
  SAVE_DATA_IN_GITHUB_CACHE: false
  DATA_CACHE_PREFIX: 'track_data'
  BUILD_GH_PAGES: true
  SAVE_TO_PARQENT: false
  GENERATE_MONTH_OF_LIFE: true

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    outputs:
      SAVE_DATA_IN_GITHUB_CACHE: ${{ steps.set_output.outputs.SAVE_DATA_IN_GITHUB_CACHE }}
      DATA_CACHE_PREFIX: ${{ steps.set_output.outputs.DATA_CACHE_PREFIX }}
      BUILD_GH_PAGES: ${{ steps.set_output.outputs.BUILD_GH_PAGES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync Garmin CN script
        if: env.RUN_TYPE == 'garmin_cn'
        run: |
          python run_page/garmin_sync.py ${{ secrets.G_PASSWORD }} --is-cn
        # 注意：这里假设你在 Secrets 里存的是佳明密码，脚本会自动处理
        # 如果你之前存的是那串长 token，请把上面这行改为：
        # python run_page/garmin_sync.py ${{ secrets.GARMIN_SECRET_STRING_CN }} --is-cn

      - name: Make svg GitHub profile
        if: env.RUN_TYPE != 'pass'
        run: |
          python run_page/gen_svg.py --from-db --title "${{ env.TITLE }}" --type github --athlete "${{ env.ATHLETE }}" --output assets/github.svg --use-localtime --min-distance 0.5
          python run_page/gen_svg.py --from-db --title "${{ env.TITLE_GRID }}" --type grid --athlete "${{ env.ATHLETE }}" --output assets/grid.svg --use-localtime --min-distance "${{ env.MIN_GRID_DISTANCE }}"
          python run_page/gen_svg.py --from-db --type circular --use-localtime

      - name: Push new runs
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add .
          git commit -m 'Update 320 training data' || echo 'nothing to commit'
          git push || echo 'nothing to push'

      - name: Set Output
        id: set_output
        run: |
          echo "SAVE_DATA_IN_GITHUB_CACHE=${{ env.SAVE_DATA_IN_GITHUB_CACHE }}" >> "$GITHUB_OUTPUT"
          echo "DATA_CACHE_PREFIX=${{ env.DATA_CACHE_PREFIX }}" >> "$GITHUB_OUTPUT"
          echo "BUILD_GH_PAGES=${{ env.BUILD_GH_PAGES }}" >> "$GITHUB_OUTPUT"

  publish_github_pages:
    needs: sync
    if: needs.sync.result == 'success' && needs.sync.outputs.BUILD_GH_PAGES == 'true'
    uses: ./.github/workflows/gh-pages.yml
    with:
      save_data_in_github_cache: false
      data_cache_prefix: 'track_data'
